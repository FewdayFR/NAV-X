<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>NAV-X Dashboard - TRANSNODE</title>
    
    <link rel="icon" type="image/x-icon" href="/static/ico.ico">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    
    <style>
        :root { 
            --bg: #02040a; /* Bleu nuit très profond */
            --card: rgba(13, 17, 23, 0.9); 
            --accent: #00d4ff; 
            --orange: #ff9800; 
        }

        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at center, #050a1f 0%, #02040a 100%);
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
        }

        /* --- BARRE DE NAVIGATION (TAB BAR) --- */
        .tab-bar {
            height: 60px;
            background: #0d1117;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            border-bottom: 1px solid #30363d;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            position: relative;
            z-index: 1000;
        }

        .menu-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* Les trois tirets (Hamburger) */
        .menu-icon {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 10px;
        }
        .menu-icon span {
            display: block;
            width: 25px;
            height: 2px;
            background: var(--accent);
            border-radius: 2px;
            transition: 0.3s;
        }

        .navx-logo-img {
            height: 35px;
            filter: drop-shadow(0 0 5px var(--accent));
        }

        .tab-items {
            display: flex;
            gap: 30px;
            color: #8b949e;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tab-item.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
            padding: 20px 0;
        }

        /* --- REGLAGE DE LA GRILLE --- */
        .dashboard-grid { 
            display: grid; 
            grid-template-columns: 1fr 2fr; 
            /* On calcule la hauteur moins la barre du haut */
            grid-template-rows: calc(100vh - 270px) 180px; 
            gap: 15px; 
            max-width: 1800px; 
            margin: 15px auto; 
            padding: 0 15px;
        }

        .card { 
            background: var(--card); 
            border-radius: 20px; 
            border: 1px solid #30363d; 
            position: relative; 
            overflow: hidden; 
        }

        /* Elements internes (inchangés pour ne rien casser) */
        #map { width: 100%; height: 100%; background: #111; }
        .camera-container { position: relative; background: #000; }
        .reflet { position: absolute; inset: 0; pointer-events: none; opacity: 0; z-index: 5; }
        
        @keyframes blink-anim { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
        .flash-L .reflet { opacity: 1; background: radial-gradient(circle at 0% 50%, var(--orange) 0%, transparent 70%); animation: blink-anim 0.8s infinite; }
        .flash-R .reflet { opacity: 1; background: radial-gradient(circle at 100% 50%, var(--orange) 0%, transparent 70%); animation: blink-anim 0.8s infinite; }
        .flash-W .reflet { opacity: 1; background: linear-gradient(90deg, var(--orange) 0%, transparent 50%, var(--orange) 100%); animation: blink-anim 0.8s infinite; }

        .speed-overlay { 
            position: absolute; bottom: 20px; left: 20px; z-index: 10; 
            background: rgba(0,0,0,0.8); padding: 12px 20px; border-radius: 15px; border: 1px solid var(--accent); 
        }
        .speed-val { font-size: 38px; font-weight: 900; color: var(--accent); }

        .controls { grid-column: 1 / span 2; display: grid; grid-template-columns: 150px 1fr 150px; align-items: center; padding: 0 40px; }
        .track { width: 12px; height: 100px; background: #222; border-radius: 6px; position: relative; overflow: hidden; }
        .fill { width: 100%; position: absolute; bottom: 0; transition: height 0.1s; }
        .dot { width: 45px; height: 45px; border: 2px solid #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #333; }
        .active-dot { border-color: var(--orange); color: var(--orange); box-shadow: 0 0 15px var(--orange); animation: blink-anim 0.8s infinite; }
        
        .leaflet-routing-container { display: none !important; }
        .robot-halo { background: rgba(0, 212, 255, 0.1); border-radius: 50%; pointer-events: none; }
    </style>
</head>
<body>

    <nav class="tab-bar">
        <div class="menu-left">
            <div class="menu-icon">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <img src="/static/logo.png" class="navx-logo-img" alt="NAV-X">
        </div>

        <div class="tab-items">
            <div class="tab-item active">Dashboard</div>
            <div class="tab-item">Missions</div>
            <div class="tab-item">System</div>
        </div>

        <div style="color: var(--accent); font-size: 12px; font-weight: bold;">
            LIVE FEED
        </div>
    </nav>

    <div class="dashboard-grid">
    <div class="card">
        <div id="map"></div>
        <div class="map-selector">
            <button id="btn-dark" class="active" onclick="setMapStyle('dark')">DARK</button>
            <button id="btn-sat" onclick="setMapStyle('sat')">SATELLITE</button>
        </div>
    </div>
    <div id="cam-card" class="card camera-container">
        <img id="video-feed" src="/video_feed" style="width:100%; height:100%; object-fit:cover;">
        <div class="reflet"></div>
        <div class="speed-overlay"><span id="speed-display" class="speed-val">0</span><span style="font-size:10px; color:#aaa"> KM/H</span></div>
    </div>
    <div class="card controls">
        <div class="track"><div id="fillL2" class="fill" style="background:var(--orange)"></div></div>
        <div style="text-align: center;">
            <div style="display:flex; justify-content:center; gap:60px; margin-bottom:10px;">
                <div id="dotL" class="dot">◀</div>
                <div id="dotR" class="dot">▶</div>
            </div>
            <h1 style="margin:0; color:var(--accent); letter-spacing: 5px;">NAV-X</h1>
        </div>
        <div class="track"><div id="fillR2" class="fill" style="background:var(--accent)"></div></div>
    </div>
</div>

<script>
    const socket = io();
    const tickSon = new Audio('https://lasonotheque.org/UPLOAD/mp3/3110.mp3');
    const gongSon = new Audio('/static/gong.mp3');
    let robotPos = [43.2951, -0.3708], currentBlinker = 'OFF', lastSend = 0;

    // --- CARTES ---
    const map = L.map('map', {zoomControl: false}).setView(robotPos, 18);
    const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
    const satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');

    const haloM = L.marker(robotPos, {icon: L.divIcon({className:'robot-halo', iconSize:[60,60]})}).addTo(map);
    const robotM = L.marker(robotPos, {icon: L.icon({iconUrl:'/static/ico.png', iconSize:[50,50], iconAnchor:[25,38]})}).addTo(map);

    function setMapStyle(s) {
        if(s === 'sat') { map.addLayer(satLayer); map.removeLayer(darkLayer); }
        else { map.addLayer(darkLayer); map.removeLayer(satLayer); }
        document.getElementById('btn-dark').classList.toggle('active', s==='dark');
        document.getElementById('btn-sat').classList.toggle('active', s==='sat');
    }

    // --- ROUTAGE PIETON ---
   const routing = L.Routing.control({
        waypoints: [],
        router: L.Routing.osrmv1({ 
            serviceUrl: 'https://router.project-osrm.org/route/v1', 
            profile: 'foot' // Mode PIÉTON
        }),
        lineOptions: { 
            styles: [{ color: '#00d4ff', weight: 6, opacity: 0.9 }],
            addWaypoints: false, // EMPECHE d'ajouter des points en cliquant sur la ligne
            extendWaypoints: false
        },
        createMarker: function(i, wp) {
            // On ne crée un marqueur que pour la destination (index 1)
            if (i === 1) {
                return L.marker(wp.latLng, {
                    draggable: true,
                    icon: L.icon({
                        iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
                        iconSize: [30, 30],
                        iconAnchor: [15, 30]
                    })
                }).bindPopup("Destination");
            }
            return null; // Pas de marqueur sur le robot (déjà existant)
        },
        show: false,
        addWaypoints: false // Désactive l'ajout de points par clic sur la carte via le controler
    }).addTo(map);

    // --- INTERCEPTION DU CLIC SUR LA CARTE ---
    // On empêche Leaflet de vider les waypoints au clic
    map.on('click', function(e) {
        // Si tu veux que le clic définisse une NOUVELLE destination au lieu de la recherche :
        // setDestination(e.latlng); 
    });

    // Fonction pour définir la destination proprement
    function setDestination(latlng) {
        const start = robotM.getLatLng();
        routing.setWaypoints([
            L.latLng(start.lat, start.lng),
            L.latLng(latlng.lat, latlng.lng)
        ]);
    }

    // --- RECHERCHE GEOCODER ---
    L.Control.geocoder({ defaultMarkGeocode: false, placeholder: "Où aller ?" })
    .on('markgeocode', function(e) {
        const dest = e.geocode.center;
        setDestination(dest);
        map.flyTo(dest, 18);
    }).addTo(map);

    // --- MISE À JOUR GPS (SOCKET) ---
    socket.on('map_update', d => {
        const p = [d.lat, d.lng];
        robotM.setLatLng(p);
        haloM.setLatLng(p);
        
        // AUTO-CENTRE
        map.panTo(p, { animate: true, duration: 0.8 });

        // MISE À JOUR DYNAMIQUE DE LA ROUTE
        const wps = routing.getWaypoints();
        if (wps[1] && wps[1].latLng) {
            // On remplace uniquement le point de départ par la nouvelle position du robot
            routing.spliceWaypoints(0, 1, L.latLng(p));
        }

        document.getElementById('speed-display').innerText = Math.round(d.speed || 0);
    });
    window.addEventListener("gamepadconnected", () => requestAnimationFrame(update));
</script>
</body>
</html>
