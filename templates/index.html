<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>NAV-X Dashboard - TRANSNODE</title>
    <link rel="icon" type="image/x-icon" href="/static/ico.ico">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    
    <style>
        :root {
            --bg: #080808; --card: #141414; --accent: #00d4ff; --text: #ffffff;
            --orange: #ff9800; --red: #ff4444; --green: #00c851;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 15px; overflow: hidden; }
        
        #loader {
            position: fixed; inset: 0; background: var(--bg); z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .loader-dots { display: flex; gap: 8px; margin-top: 20px; }
        .dot-load { width: 12px; height: 12px; background: var(--accent); border-radius: 50%; animation: bounce 0.6s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-15px); } }

        .top-bar { display: flex; align-items: center; justify-content: space-between; padding-bottom: 10px; }
        .navx-logo { height: 40px; filter: drop-shadow(0 0 5px var(--accent)); }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 2fr; grid-template-rows: 65vh 180px; gap: 15px; max-width: 1800px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 20px; border: 1px solid #252525; position: relative; overflow: hidden; }

        #map { width: 100%; height: 100%; background: #111; }
        
        .speed-overlay {
            position: absolute; bottom: 20px; left: 20px; z-index: 10;
            background: rgba(0,0,0,0.8); padding: 12px 20px; border-radius: 15px; border: 1px solid var(--accent);
        }
        .speed-val { font-size: 38px; font-weight: 900; color: var(--accent); display: block; line-height: 1; }

        .controls { grid-column: 1 / span 2; display: grid; grid-template-columns: 150px 1fr 150px; align-items: center; padding: 0 40px; }
        .track { width: 12px; height: 100px; background: #222; border-radius: 6px; position: relative; overflow: hidden; }
        .fill { width: 100%; position: absolute; bottom: 0; }
        #fillL2 { background: var(--red); }
        #fillR2 { background: var(--green); }
        .dot { width: 45px; height: 45px; border: 2px solid #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #333; }
        .active-dot { border-color: var(--orange); color: var(--orange); box-shadow: 0 0 15px var(--orange); animation: blink-anim 0.8s infinite; }
        @keyframes blink-anim { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

<div id="loader">
    <img src="/static/logo.png" style="height:80px;">
    <div class="loader-dots"><div class="dot-load"></div><div class="dot-load"></div><div class="dot-load"></div></div>
</div>

<div class="top-bar">
    <img src="/static/logo.png" class="navx-logo">
    <div id="status-badge" style="color:var(--red);">● DÉCONNECTÉ</div>
</div>

<div class="dashboard-grid">
    <div class="card"><div id="map"></div></div>
    
    <div id="cam-card" class="card">
        <img id="video-feed" src="/video_feed" style="width:100%; height:100%; object-fit:cover;">
        <div class="speed-overlay">
            <span id="speed-display" class="speed-val">0</span>
            <span style="font-size:10px; color:#aaa">KM/H</span>
        </div>
    </div>

    <div class="card controls">
        <div style="text-align:center;"><div class="track"><div id="fillL2" class="fill"></div></div></div>
        <div style="text-align: center;">
            <div style="display:flex; justify-content:center; gap:60px;">
                <div id="dotL" class="dot">◀</div>
                <div id="dotR" class="dot">▶</div>
            </div>
            <h2 id="conn-text" style="color:var(--accent); margin:10px 0;">NAV-X READY</h2>
        </div>
        <div style="text-align:center;"><div class="track"><div id="fillR2" class="fill"></div></div></div>
    </div>
</div>

<script>
    const socket = io();
    let lastSend = 0;
    let currentBlinker = 'OFF';
    let robotPos = [43.2951, -0.3708];

    // --- INITIALISATION MAP ---
    const map = L.map('map', {zoomControl: false}).setView(robotPos, 17);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
    const robotIcon = L.icon({ iconUrl: '/static/ico.png', iconSize: [50, 50], iconAnchor: [25, 38] });
    const marker = L.marker(robotPos, {icon: robotIcon}).addTo(map);

    // --- SOCKET EVENTS ---
    socket.on('connect', () => {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('status-badge').style.color = 'var(--green)';
        document.getElementById('status-badge').innerText = '● CONNECTÉ';
    });

    socket.on('map_update', (data) => {
        const newPos = [data.lat, data.lng];
        marker.setLatLng(newPos);
        map.panTo(newPos);
        document.getElementById('speed-display').innerText = Math.round(data.speed || 0);
    });

    // --- GAMEPAD & CONTROL LOOP ---
    let lastB1 = false, lastB2 = false, lastB3 = false;

    function update() {
        const gamepads = navigator.getGamepads();
        const gp = gamepads[0];
        if (!gp) return requestAnimationFrame(update);

        // Détection changements clignotants (Boutons L1, R1, Triangle)
        if (gp.buttons[4].pressed && !lastB1) toggleBlinker('L');
        if (gp.buttons[5].pressed && !lastB2) toggleBlinker('R');
        if (gp.buttons[3].pressed && !lastB3) toggleBlinker('W');
        
        lastB1 = gp.buttons[4].pressed;
        lastB2 = gp.buttons[5].pressed;
        lastB3 = gp.buttons[3].pressed;

        // Visualisation Jauges Gaz/Frein
        document.getElementById('fillL2').style.height = (gp.buttons[6].value * 100) + "%";
        document.getElementById('fillR2').style.height = (gp.buttons[7].value * 100) + "%";

        // LIMITATEUR D'ENVOI (50ms)
        const now = Date.now();
        if (now - lastSend > 50) {
            const v = Math.round((gp.buttons[7].value - gp.buttons[6].value) * 255);
            const d = Math.round(gp.axes[0] * 255);
            const h = gp.buttons[14].pressed; // Klaxon sur bouton tactile ou bas
            
            socket.emit('drive_cmd', { v: v, d: d, blinker: currentBlinker, horn: h });
            lastSend = now;
        }

        requestAnimationFrame(update);
    }

    function toggleBlinker(mode) {
        currentBlinker = (currentBlinker === mode) ? 'OFF' : mode;
        document.getElementById('dotL').classList.toggle('active-dot', currentBlinker === 'L' || currentBlinker === 'W');
        document.getElementById('dotR').classList.toggle('active-dot', currentBlinker === 'R' || currentBlinker === 'W');
    }

    window.addEventListener("gamepadconnected", () => {
        console.log("Gamepad OK");
        requestAnimationFrame(update);
    });

</script>
</body>
</html>
