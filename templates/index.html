<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>NAVX Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="top-bar">
        <div class="brand">
            <img src="/static/logo.png" class="nav-logo" alt="NAVX">
            NAV<span class="accent">X</span>
        </div>
        <div class="header-status">
            <span id="esp-stat" class="status-off">ESP32 OFFLINE</span>
            <span class="divider">|</span>
            <span class="ping-text">PING: <span id="ping-val">--</span> ms</span>
        </div>
    </div>

    <div class="container">
        <div class="panel">
            <div id="map"></div>
            <button id="map-toggle-btn" class="map-toggle">🗺️ CLASSIQUE</button>
            <div class="speed-box"><span id="speed">0</span> km/h</div>
        </div>

        <div class="panel video-panel">
            <img src="/video_feed" class="stream" onerror="this.style.display='none';">
            <div id="gui-L" class="halo-light l"></div>
            <div id="gui-R" class="halo-light r"></div>
        </div>
    </div>

    <div class="bottom-ctrl">
        <div class="gauge-container">
            <div class="label">BRAKE</div>
            <div class="gauge-track"><div id="fill-l2" class="fill brake"></div></div>
        </div>

        <div class="lights-group">
            <div id="dot-L" class="icon-btn"><i data-lucide="chevron-left"></i></div>
            <div id="dot-W" class="icon-btn warn"><i data-lucide="alert-triangle"></i></div>
            <div id="dot-R" class="icon-btn"><i data-lucide="chevron-right"></i></div>
        </div>

        <div class="gauge-container">
            <div class="label">POWER</div>
            <div class="gauge-track"><div id="fill-r2" class="fill power"></div></div>
        </div>
        
        <div id="joy-label" class="joy-info">WAITING FOR GAMEPAD...</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="/static/script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
