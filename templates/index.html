<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>NAV-X Dashboard - TRANSNODE</title>
    <link rel="icon" type="image/x-icon" href="/static/ico.ico">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    
    <style>
        :root {
            --bg: #080808; --card: #141414; --accent: #00d4ff; --text: #ffffff;
            --orange: #ff9800; --red: #ff4444; --green: #00c851;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 15px; overflow: hidden; }
        
        #loader {
            position: fixed; inset: 0; background: var(--bg); z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .loader-dots { display: flex; gap: 8px; margin-top: 20px; }
        .dot-load { width: 12px; height: 12px; background: var(--accent); border-radius: 50%; animation: bounce 0.6s infinite alternate; }
        .dot-load:nth-child(2) { animation-delay: 0.2s; }
        .dot-load:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-15px); } }

        .top-bar { display: flex; align-items: center; justify-content: space-between; padding-bottom: 10px; }
        .navx-logo { height: 40px; filter: drop-shadow(0 0 5px var(--accent)); }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 2fr; grid-template-rows: 65vh 180px; gap: 15px; max-width: 1800px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 20px; border: 1px solid #252525; position: relative; overflow: hidden; }

        #map { width: 100%; height: 100%; background: #111; }
        .leaflet-routing-container { display: none !important; }
        
        #dest-popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 9999; background: rgba(20, 20, 20, 0.98); border: 2px solid var(--accent);
            padding: 25px; border-radius: 25px; text-align: center; display: none;
            backdrop-filter: blur(20px); box-shadow: 0 0 50px rgba(0, 212, 255, 0.4);
            width: 500px;
        }
        #mini-map { width: 100%; height: 250px; border-radius: 15px; margin: 15px 0; border: 1px solid #333; pointer-events: none; }
        .popup-btns { display: flex; gap: 15px; justify-content: center; }
        .btn-pop { padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; border: none; }
        .btn-ready { background: #333; color: #aaa; }
        .btn-go { background: var(--accent); color: #000; }

        .map-selector {
            position: absolute; bottom: 15px; left: 15px; z-index: 1000;
            display: flex; gap: 5px; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 8px;
        }
        .map-selector button { 
            background: transparent; border: 1px solid #444; color: white; 
            padding: 5px 10px; cursor: pointer; font-size: 10px; border-radius: 4px;
        }
        .map-selector button.active { border-color: var(--accent); color: var(--accent); }

        .btn-recentrer { 
            position: absolute; bottom: 15px; right: 15px; z-index: 1000;
            background: rgba(20,20,20,0.8); color: white; border: 1px solid var(--accent);
            padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 11px;
        }

        .robot-halo { background: rgba(0, 212, 255, 0.4); border: 2px solid var(--accent); border-radius: 50%; pointer-events: none; }
        .camera-container { background: #000; position: relative; }
        #video-feed { width: 100%; height: 100%; object-fit: cover; }
        .reflet { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0; z-index: 5; }
        
        @keyframes blink-anim { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
        .flash-L .reflet { opacity: 1; background: radial-gradient(circle at 0% 50%, var(--orange) 0%, transparent 60%); animation: blink-anim 0.8s infinite; }
        .flash-R .reflet { opacity: 1; background: radial-gradient(circle at 100% 50%, var(--orange) 0%, transparent 60%); animation: blink-anim 0.8s infinite; }
        .flash-W .reflet { opacity: 1; background: linear-gradient(90deg, var(--orange) 0%, transparent 50%, var(--orange) 100%); animation: blink-anim 0.8s infinite; }

        .speed-overlay {
            position: absolute; bottom: 20px; left: 20px; z-index: 10;
            background: rgba(0,0,0,0.8); padding: 12px 20px; border-radius: 15px; border: 1px solid var(--accent);
        }
        .speed-val { font-size: 38px; font-weight: 900; color: var(--accent); display: block; line-height: 1; }

        .controls { grid-column: 1 / span 2; display: grid; grid-template-columns: 150px 1fr 150px; align-items: center; padding: 0 40px; }
        .track { width: 12px; height: 100px; background: #222; border-radius: 6px; position: relative; overflow: hidden; }
        .fill { width: 100%; position: absolute; bottom: 0; transition: height 0.1s linear; }
        #fillL2 { background: var(--red); }
        #fillR2 { background: var(--green); }
        .dot { width: 45px; height: 45px; border: 2px solid #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #333; }
        .active-dot { border-color: var(--orange); color: var(--orange); box-shadow: 0 0 15px var(--orange); animation: blink-anim 0.8s infinite; }
    </style>
</head>
<body>

<div id="loader">
    <img src="/static/logo.png" style="height:80px; filter:drop-shadow(0 0 10px var(--accent))">
    <div class="loader-dots">
        <div class="dot-load"></div><div class="dot-load"></div><div class="dot-load"></div>
    </div>
</div>

<div id="dest-popup">
    <h3 id="pop-addr" style="color:var(--accent); margin:0;">DESTINATION</h3>
    <div id="mini-map"></div>
    <div class="popup-btns">
        <button class="btn-pop btn-ready" onclick="closePopup(false)">NOT READY YET</button>
        <button class="btn-pop btn-go" onclick="closePopup(true)">LET'S GO</button>
    </div>
</div>

<div class="top-bar">
    <img src="/static/logo.png" class="navx-logo">
    <div style="color:var(--accent); font-weight: bold;">NAV-X | DASHBOARD</div>
</div>

<div class="dashboard-grid">
    <div class="card">
        <div id="map"></div>
        <div class="map-selector">
            <button id="btn-dark" class="active" onclick="setMapStyle('dark')">DARK</button>
            <button id="btn-sat" onclick="setMapStyle('sat')">SATELLITE</button>
        </div>
        <button class="btn-recentrer" onclick="recentrerMap()">📍 RECENTRER</button>
    </div>
    
    <div id="cam-card" class="card camera-container">
        <img id="video-feed" src="http://pi.local:8080/stream">
        <div class="reflet"></div>
        <div class="speed-overlay">
            <span id="speed-display" class="speed-val">0</span>
            <span style="font-size:10px; color:#aaa">KM/H</span>
        </div>
    </div>

    <div class="card controls">
        <div style="text-align:center;"><div class="track"><div id="fillL2" class="fill"></div></div><span style="font-size:10px;">L2 FREIN</span></div>
        <div style="text-align: center;">
            <div style="display:flex; justify-content:center; gap:60px; margin-bottom:10px;">
                <div id="dotL" class="dot">◀</div>
                <div id="dotR" class="dot">▶</div>
            </div>
            <h1 style="margin:0; color:var(--accent);">NAV-X</h1>
            <p id="dest-text" style="font-size:11px; color:#555;">SÉLECTIONNEZ UNE DESTINATION</p>
        </div>
        <div style="text-align:center;"><div class="track"><div id="fillR2" class="fill"></div></div><span style="font-size:10px;">R2 GAZ</span></div>
    </div>
</div>

<script>
    const socket = io();
    const tickSon = new Audio('https://lasonotheque.org/UPLOAD/mp3/3110.mp3');
    const gongSon = new Audio('/static/gong.mp3');
    
    let robotPos = [43.2951, -0.3708];
    let tempDest = null, tempName = "";
    let currentBlinker = null, audioInterval = null;
    let lastL1 = false, lastR1 = false, lastTri = false, lastGong = false;

    // --- CARTES ---
    const map = L.map('map', {zoomControl: false}).setView(robotPos, 16);
    const miniMap = L.map('mini-map', {zoomControl: false, attributionControl: false});

    const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
    const satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(miniMap);

    function setMapStyle(style) {
        if(style === 'sat') {
            map.addLayer(satLayer); map.removeLayer(darkLayer);
            document.getElementById('btn-sat').classList.add('active');
            document.getElementById('btn-dark').classList.remove('active');
        } else {
            map.addLayer(darkLayer); map.removeLayer(satLayer);
            document.getElementById('btn-dark').classList.add('active');
            document.getElementById('btn-sat').classList.remove('active');
        }
    }

    map.createPane('haloPane'); map.getPane('haloPane').style.zIndex = 400;
    const haloIcon = L.divIcon({ className: 'robot-halo', iconSize: [50, 50], iconAnchor: [25, 25] });
    
    // ANCRE MISE À 43 SELON TA DEMANDE
    const robotIcon = L.icon({ iconUrl: '/static/ico.png', iconSize: [60, 60], iconAnchor: [30, 43] });

    const haloMarker = L.marker(robotPos, {icon: haloIcon, pane: 'haloPane'}).addTo(map);
    const robotMarker = L.marker(robotPos, {icon: robotIcon}).addTo(map);

    const routing = L.Routing.control({
        waypoints: [],
        router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1', profile: 'foot' }),
        lineOptions: { styles: [{ color: '#00d4ff', weight: 5 }] },
        createMarker: () => null, show: false
    }).addTo(map);

    const miniRouting = L.Routing.control({
        waypoints: [],
        router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1', profile: 'foot' }),
        lineOptions: { styles: [{ color: '#ff9800', weight: 4 }] },
        createMarker: () => null, show: false
    }).addTo(miniMap);

    // AUTO-ZOOM DÉZOOMÉ POUR LA MINI MAP
    miniRouting.on('routesfound', function(e) {
        const bounds = L.latLngBounds([robotMarker.getLatLng(), tempDest]);
        miniMap.fitBounds(bounds, {padding: [50, 50], maxZoom: 16});
    });

    const geocoder = L.Control.geocoder({ defaultMarkGeocode: false, placeholder: "🔍 Destination..." })
    .on('markgeocode', function(e) {
        tempDest = e.geocode.center;
        tempName = e.geocode.name.split(',')[0].toUpperCase();
        document.getElementById('pop-addr').innerText = tempName;
        document.getElementById('dest-popup').style.display = 'block';
        
        // On force le rafraîchissement du tracé
        setTimeout(() => {
            miniMap.invalidateSize();
            miniRouting.setWaypoints([L.latLng(robotMarker.getLatLng()), L.latLng(tempDest)]);
        }, 300);
    }).addTo(map);

    function closePopup(confirm) {
        document.getElementById('dest-popup').style.display = 'none';
        if (confirm && tempDest) {
            routing.setWaypoints([L.latLng(robotMarker.getLatLng()), L.latLng(tempDest)]);
            document.getElementById('dest-text').innerText = tempName;
            setTimeout(() => { map.panTo(robotMarker.getLatLng()); }, 400);
        } else {
            routing.setWaypoints([]);
            miniRouting.setWaypoints([]);
            document.getElementById('dest-text').innerText = "SÉLECTIONNEZ UNE DESTINATION";
        }
    }

    function recentrerMap() { map.panTo(robotMarker.getLatLng()); }

    window.onload = () => { setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 2000); };

    // --- GAMEPAD LOOP ---
    window.addEventListener("gamepadconnected", () => { setInterval(updateLoop, 50); });

    function updateLoop() {
        const gp = navigator.getGamepads()[0];
        if (!gp) return;
        if (gp.buttons[14].pressed && !lastGong) { gongSon.currentTime = 0; gongSon.play().catch(()=>{}); }
        lastGong = gp.buttons[14].pressed;
        let pTri = gp.buttons[3].pressed, pL1 = gp.buttons[4].pressed, pR1 = gp.buttons[5].pressed;
        if (pTri && !lastTri) currentBlinker = (currentBlinker === 'W') ? null : 'W';
        else if (pL1 && !lastL1) currentBlinker = (currentBlinker === 'L' || currentBlinker === 'R' || currentBlinker === 'W') ? null : 'L';
        else if (pR1 && !lastR1) currentBlinker = (currentBlinker === 'R' || currentBlinker === 'L' || currentBlinker === 'W') ? null : 'R';
        if (pL1 !== lastL1 || pR1 !== lastR1 || pTri !== lastTri) updateBlinkerUI();
        lastTri = pTri; lastL1 = pL1; lastR1 = pR1;
        document.getElementById('fillL2').style.height = (gp.buttons[6].value * 100) + "%";
        document.getElementById('fillR2').style.height = (gp.buttons[7].value * 100) + "%";
        socket.emit('drive_cmd', { v: Math.round((gp.buttons[7].value - gp.buttons[6].value) * 255), d: Math.round(gp.axes[0] * 255), blinker: currentBlinker });
    }

    function updateBlinkerUI() {
        const cam = document.getElementById('cam-card');
        const dL = document.getElementById('dotL'), dR = document.getElementById('dotR');
        cam.classList.remove('flash-L', 'flash-R', 'flash-W');
        dL.classList.remove('active-dot'); dR.classList.remove('active-dot');
        if (audioInterval) { clearInterval(audioInterval); audioInterval = null; }
        tickSon.pause(); tickSon.currentTime = 0;
        if (currentBlinker === 'L') { cam.classList.add('flash-L'); dL.classList.add('active-dot'); }
        else if (currentBlinker === 'R') { cam.classList.add('flash-R'); dR.classList.add('active-dot'); }
        else if (currentBlinker === 'W') { cam.classList.add('flash-W'); dL.classList.add('active-dot'); dR.classList.add('active-dot'); }
        if (currentBlinker) {
            tickSon.play().catch(()=>{});
            audioInterval = setInterval(() => { tickSon.currentTime = 0; tickSon.play().catch(()=>{}); }, 800);
        }
    }

    socket.on('map_update', (data) => {
        const p = L.latLng(data.lat, data.lng);
        robotMarker.setLatLng(p);
        haloMarker.setLatLng(p);
        document.getElementById('speed-display').innerText = Math.round(data.speed || 0);
    });
</script>
</body>
</html>
