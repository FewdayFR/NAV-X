<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAV-X</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { margin: 0; background: #0f0f0f; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        .top-bar { height: 60px; background: #000; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 2px solid #333; }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .status-online { background: rgba(0, 200, 81, 0.2); color: #00c851; border: 1px solid #00c851; }
        .status-offline { background: rgba(255, 62, 62, 0.2); color: #ff4444; border: 1px solid #ff4444; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
        .container { display: grid; grid-template-columns: 1fr 300px; height: calc(100vh - 60px); padding: 10px; gap: 10px; }
        .main-view { background: #1a1a1a; border-radius: 10px; position: relative; }
        .btn { background: #222; border: 1px solid #444; color: white; padding: 15px; border-radius: 8px; width: 100%; margin-bottom: 5px; cursor: pointer; }
        .btn-active { background: #ff4444; }
        #loader { position: fixed; inset: 0; background: #0f0f0f; display: flex; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="loader"><p>CHARGEMENT...</p></div>

<div class="top-bar">
    <div id="esp-status" class="status-badge status-offline">
        <div class="status-dot"></div>
        <span id="status-text">ESP32 DISCONNECTED</span>
    </div>
    <div style="color:#ff4444; font-weight: bold;">NAV-X SYSTEM</div>
</div>

<div class="container">
    <div class="main-view"></div>
    <div class="side-panel">
        <button class="btn" onclick="setB('L')" id="btn-L">GAUCHE</button>
        <button class="btn" onclick="setB('R')" id="btn-R">DROIT</button>
        <button class="btn" onclick="setB('W')" id="btn-W">WARNING</button>
        <button class="btn" onmousedown="setH(true)" onmouseup="setH(false)">KLAXON</button>
    </div>
</div>

<script>
    const socket = io();
    let bMode = 'OFF', hAct = false, lastS = 0;
    let keys = {};

    socket.on('connect', () => document.getElementById('loader').style.display='none');
    socket.on('esp_status', (d) => {
        const b = document.getElementById('esp-status');
        b.className = d.connected ? "status-badge status-online" : "status-badge status-offline";
        document.getElementById('status-text').innerText = d.connected ? "ESP32 CONNECTED" : "ESP32 DISCONNECTED";
    });

    window.onkeydown = (e) => { keys[e.key.toLowerCase()] = true; drive(); };
    window.onkeyup = (e) => { keys[e.key.toLowerCase()] = false; drive(); };

    function setB(m) { bMode = (bMode === m) ? 'OFF' : m; drive(); }
    function setH(s) { hAct = s; drive(); }

    function drive() {
        let v = 0, d = 0;
        if (keys['z']) v = 255; if (keys['s']) v = -255;
        if (keys['q']) d = -255; if (keys['d']) d = 255;
        
        const now = Date.now();
        if (now - lastS > 50) { // LIMITATEUR ANTI-LATENCE
            socket.emit('drive_cmd', {v:v, d:d, blinker:bMode, horn:hAct});
            lastS = now;
        }
    }
</script>
</body>
</html>
