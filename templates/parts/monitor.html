<div class="card" style="position: relative;">
    <div id="map"></div>
    <div style="position: absolute; top: 15px; right: 15px; z-index: 1000; pointer-events: none; text-align: right;">
        <div style="color: var(--accent); font-family: monospace; font-size: 11px; text-shadow: 0 0 5px #000;">
            <span style="opacity: 0.6;">SIGNAL:</span> LOCKED<br>
            <span style="opacity: 0.6;">AUTO_CENTER:</span> 5.0s<br>
            <span style="color: var(--orange);">●</span> LIVE_FEED
        </div>
    </div>
    
    <div class="map-selector">
        <button id="btn-dark" class="active" onclick="setMapStyle('dark')">DARK</button>
        <button id="btn-sat" onclick="setMapStyle('sat')">SATELLITE</button>
    </div>
</div>

<div id="cam-card" class="card camera-container">
    <img id="video-feed" src="/video_feed" style="width:100%; height:100%; object-fit:cover;">
    <div class="reflet"></div>
    <div class="speed-overlay">
        <span id="speed-display" class="speed-val">0</span>
        <span style="font-size:12px; color:#888; letter-spacing: 2px;"> KM/H</span>
    </div>
</div>
